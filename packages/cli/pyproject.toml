[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "co-scientist-cli"
version = "0.0.1"
description = "Installer/CLI for co-scientist-cloud: sign in, write config, link a project dir to Claude Code."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
test = ["pytest>=8.0"]

[project.scripts]
co-scientist = "co_scientist_cli.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["co_scientist_cli*"]
